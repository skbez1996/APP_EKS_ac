name: Destroy EKS Infra

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  destroy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Configure AWS credentials from OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region ${{ secrets.AWS_REGION }} \
            --name ${{ secrets.EKS_CLUSTER_NAME }}

      - name: Delete Crossplane RDS resources
        run: |
          kubectl delete -f k8s/crossplane/rds-instance.yaml --ignore-not-found=true
          kubectl delete -f k8s/crossplane/rds-subnetgroup.yaml --ignore-not-found=true
          echo "Waiting for RDS instance to be deleted..."
          kubectl wait --for=delete instance/demo-mysql --timeout=300s || true

      - name: Delete LoadBalancer service and deployment
        run: |
          kubectl delete -f k8s/service.yaml --ignore-not-found=true
          kubectl delete -f k8s/deployment.yaml --ignore-not-found=true
          echo "Waiting for LoadBalancer to be deprovisioned..."
          sleep 30

      - name: Install Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform init
        working-directory: terraform
        run: terraform init

      - name: Terraform destroy
        working-directory: terraform
        run: terraform destroy -auto-approve
